<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Clone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #25D366;
      --dark-green:   #128C7E;
      --light-green:  #DCF8C6;
      --bg:           #ECE5DD;
      --header:       #075E54;
      --text:         #111;
      --muted:        #888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ---- App shell ---- */
    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 24px rgba(0,0,0,.18);
    }

    /* ---- Header ---- */
    header {
      background: var(--header);
      color: white;
      padding: .9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
    }
    header .back { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; padding: .2rem .4rem; }
    header h1   { font-size: 1.05rem; font-weight: 600; line-height: 1.2; }
    header .sub { font-size: .78rem; opacity: .8; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--dark-green); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; font-weight: 700; flex-shrink: 0;
    }

    /* ---- Views ---- */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ============================================================
       LOGIN VIEW
    ============================================================ */
    #login-view {
      justify-content: center; align-items: center;
      padding: 2rem 1.5rem; gap: 1.25rem;
    }
    #login-view .logo  { font-size: 4rem; }
    #login-view h2     { color: var(--header); font-size: 1.4rem; }
    #login-view p      { color: var(--muted); font-size: .88rem; text-align: center; line-height: 1.5; }

    .user-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: .65rem; width: 100%; max-height: 220px; overflow-y: auto;
    }

    /* ---- Create user form ---- */
    .create-user-form {
      display: flex; gap: .5rem; width: 100%;
    }
    .create-user-form input {
      flex: 1; padding: .6rem .9rem; border: 1px solid #ddd; border-radius: 10px;
      font-size: .92rem; outline: none;
    }
    .create-user-form input:focus { border-color: var(--green); }
    .btn-create {
      padding: .6rem .9rem; border: none; border-radius: 10px;
      background: var(--header); color: white; font-size: .88rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .15s;
    }
    .btn-create:hover { background: var(--dark-green); }
    .divider {
      width: 100%; display: flex; align-items: center; gap: .75rem; color: var(--muted); font-size: .8rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }

    /* ---- Create room bar (rooms view) ---- */
    .create-room-bar {
      display: flex; gap: .5rem;
      padding: .65rem .9rem; border-bottom: 1px solid #eee; background: #fafafa; flex-shrink: 0;
    }
    .create-room-bar input {
      flex: 1; padding: .55rem .85rem; border: 1px solid #ddd; border-radius: 10px;
      font-size: .9rem; outline: none;
    }
    .create-room-bar input:focus { border-color: var(--green); }
    .create-room-bar button {
      padding: .55rem .9rem; border: none; border-radius: 10px;
      background: var(--header); color: white; font-size: .85rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .15s;
    }
    .create-room-bar button:hover { background: var(--dark-green); }
    .user-btn {
      padding: .7rem; border: 2px solid #e0e0e0; border-radius: 10px;
      background: white; cursor: pointer; font-size: .92rem; color: var(--text);
      transition: border-color .15s, background .15s; text-align: center;
    }
    .user-btn:hover    { border-color: var(--green); }
    .user-btn.selected { border-color: var(--green); background: var(--light-green); font-weight: 600; }

    .btn-primary {
      width: 100%; padding: .75rem; font-size: .95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      background: var(--green); color: white; transition: background .15s;
    }
    .btn-primary:hover    { background: var(--dark-green); }
    .btn-primary:disabled { background: #ccc; cursor: default; }

    /* ============================================================
       ROOMS VIEW
    ============================================================ */
    .scroll-area { flex: 1; overflow-y: auto; }

    .room-item {
      display: flex; align-items: center;
      padding: .85rem 1.2rem; border-bottom: 1px solid #f2f2f2; gap: .9rem;
    }
    .room-info      { flex: 1; min-width: 0; }
    .room-name      { font-weight: 600; font-size: .97rem; color: var(--text); }
    .room-sub-label { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    .room-actions   { display: flex; gap: .45rem; flex-shrink: 0; }
    .btn-sm {
      padding: .35rem .7rem; border-radius: 18px; border: none;
      font-size: .78rem; font-weight: 500; cursor: pointer; transition: background .15s;
    }
    .btn-enter  { background: var(--green); color: white; }
    .btn-enter:hover  { background: var(--dark-green); }
    .btn-toggle { background: #f0f0f0; color: var(--text); }
    .btn-toggle:hover { background: #e3e3e3; }
    .btn-toggle.on    { background: var(--light-green); color: var(--dark-green); }

    /* ============================================================
       CHAT VIEW
    ============================================================ */
    .messages {
      flex: 1; overflow-y: auto;
      padding: .8rem; display: flex; flex-direction: column; gap: .45rem;
      background: var(--bg);
    }

    .msg {
      max-width: 76%; padding: .45rem .7rem;
      border-radius: 8px; position: relative;
    }
    .msg.own   { align-self: flex-end;   background: var(--light-green); border-bottom-right-radius: 2px; }
    .msg.other { align-self: flex-start; background: white; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
    .msg.system {
      align-self: center; background: rgba(225,245,254,.9);
      color: #555; font-size: .76rem; padding: .28rem .7rem;
      border-radius: 18px; text-align: center; max-width: 90%;
    }
    .msg-author  { font-size: .76rem; font-weight: 600; color: var(--dark-green); margin-bottom: 2px; }
    .msg-content { font-size: .93rem; color: var(--text); word-break: break-word; }
    .msg-time    { font-size: .66rem; color: var(--muted); text-align: right; margin-top: 2px; }

    /* ---- Input bar ---- */
    .chat-bar {
      display: flex; padding: .6rem .75rem; gap: .5rem;
      background: white; border-top: 1px solid #eee; align-items: center;
      flex-shrink: 0;
    }
    .chat-bar input {
      flex: 1; padding: .6rem 1rem; border: 1px solid #ddd; border-radius: 22px;
      font-size: .93rem; outline: none;
    }
    .chat-bar input:focus { border-color: var(--green); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--green); color: white; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .send-btn:hover { background: var(--dark-green); }

    /* ---- Toast ---- */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: .55rem 1.2rem;
      border-radius: 22px; font-size: .88rem;
      opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
  </style>
</head>
<body>
<div class="app">

  <!-- ===== LOGIN ===== -->
  <div id="login-view" class="view active">
    <div class="logo">💬</div>
    <h2>WhatsApp Clone</h2>

    <!-- Create new user -->
    <p>Créer un nouveau compte :</p>
    <div class="create-user-form">
      <input type="text" id="new-user-input" placeholder="Votre nom…" maxlength="50" />
      <button class="btn-create" id="create-user-btn">Créer</button>
    </div>

    <div class="divider">ou choisir un compte existant</div>

    <div class="user-grid" id="user-grid"></div>
    <button class="btn-primary" id="login-btn" disabled>Continuer →</button>
  </div>

  <!-- ===== ROOMS ===== -->
  <div id="rooms-view" class="view">
    <header>
      <div>
        <h1>Salons</h1>
        <div class="sub" id="rooms-sub"></div>
      </div>
    </header>
    <div class="create-room-bar">
      <input type="text" id="new-room-input" placeholder="Nouveau salon…" maxlength="50" />
      <button id="create-room-btn">+ Créer</button>
    </div>
    <div class="scroll-area" id="rooms-list"></div>
  </div>

  <!-- ===== CHAT ===== -->
  <div id="chat-view" class="view">
    <header>
      <button class="back" id="back-btn">←</button>
      <div class="avatar" id="chat-avatar"></div>
      <div>
        <h1 id="chat-title"></h1>
        <div class="sub" id="chat-status">connecté</div>
      </div>
    </header>
    <div class="messages" id="messages"></div>
    <div class="chat-bar">
      <input type="text" id="msg-input" placeholder="Écrivez un message…" maxlength="500" />
      <button class="send-btn" id="send-btn">➤</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// -----------------------------------------------------------------------
// State
// -----------------------------------------------------------------------
let currentUser = null;   // chosen user name
let currentRoom = null;   // room we are chatting in
let ws = null;            // active WebSocket

// -----------------------------------------------------------------------
// Helpers
// -----------------------------------------------------------------------
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(name + '-view').classList.add('active');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// Prevent XSS in message content
function esc(text) {
  return text.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

// -----------------------------------------------------------------------
// LOGIN
// -----------------------------------------------------------------------
async function loadUsers() {
  const users = await fetch('/users').then(r => r.json());
  const grid = document.getElementById('user-grid');
  grid.innerHTML = '';

  if (users.length === 0) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888">Aucun utilisateur.<br>Créez-en via la CLI :<br><code>http POST /users name=alice</code></p>';
    return;
  }

  users.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.textContent = u.name;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentUser = u.name;
      document.getElementById('login-btn').disabled = false;
    });
    grid.appendChild(btn);
  });
}

document.getElementById('login-btn').addEventListener('click', async () => {
  if (!currentUser) return;
  await loadRooms();
  document.getElementById('rooms-sub').textContent = currentUser;
  showView('rooms');
});

// Create user from the UI
async function createUser() {
  const input = document.getElementById('new-user-input');
  const name = input.value.trim();
  if (!name) return;

  const res = await fetch('/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });

  if (res.status === 400) {
    toast('Ce nom est déjà pris.');
    return;
  }

  input.value = '';
  await loadUsers();
  // Auto-select the newly created user
  document.querySelectorAll('.user-btn').forEach(btn => {
    if (btn.textContent === name) btn.click();
  });
}

document.getElementById('create-user-btn').addEventListener('click', createUser);
document.getElementById('new-user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createUser();
});

// -----------------------------------------------------------------------
// ROOMS
// -----------------------------------------------------------------------
async function loadRooms() {
  const rooms = await fetch(`/rooms?user_name=${encodeURIComponent(currentUser)}`).then(r => r.json());
  const list = document.getElementById('rooms-list');
  list.innerHTML = '';

  if (rooms.length === 0) {
    list.innerHTML = '<p style="padding:2rem;text-align:center;color:#888">Aucun salon disponible.<br>Créez-en via la CLI :<br><code>http POST /rooms/social</code></p>';
    return;
  }

  rooms.forEach(room => {
    const item = document.createElement('div');
    item.className = 'room-item';
    item.innerHTML = `
      <div class="avatar">${room.name[0].toUpperCase()}</div>
      <div class="room-info">
        <div class="room-name">${esc(room.name)}</div>
        <div class="room-sub-label">${room.subscribed ? '✓ Abonné' : 'Non abonné'}</div>
      </div>
      <div class="room-actions">
        <button class="btn-sm btn-toggle ${room.subscribed ? 'on' : ''}"
                data-room="${esc(room.name)}" data-sub="${room.subscribed}">
          ${room.subscribed ? 'Se désabonner' : "S'abonner"}
        </button>
        <button class="btn-sm btn-enter" data-enter="${esc(room.name)}">Entrer</button>
      </div>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('[data-sub]').forEach(btn => {
    btn.addEventListener('click', () => toggleSub(btn.dataset.room, btn.dataset.sub === '1'));
  });
  list.querySelectorAll('[data-enter]').forEach(btn => {
    btn.addEventListener('click', () => enterRoom(btn.dataset.enter));
  });
}

async function createRoom() {
  const input = document.getElementById('new-room-input');
  const name = input.value.trim();
  if (!name) return;

  const res = await fetch(`/rooms/${encodeURIComponent(name)}`, { method: 'POST' });

  if (res.status === 400) {
    toast('Ce salon existe déjà.');
    return;
  }

  input.value = '';
  await loadRooms();
}

document.getElementById('create-room-btn').addEventListener('click', createRoom);
document.getElementById('new-room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createRoom();
});

async function toggleSub(roomName, isSubscribed) {
  const endpoint = isSubscribed ? 'unsubscribe' : 'subscribe';
  await fetch(`/rooms/${encodeURIComponent(roomName)}/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: currentUser }),
  });
  await loadRooms();
}

// -----------------------------------------------------------------------
// CHAT
// -----------------------------------------------------------------------
async function enterRoom(roomName) {
  currentRoom = roomName;
  document.getElementById('chat-title').textContent = roomName;
  document.getElementById('chat-avatar').textContent = roomName[0].toUpperCase();
  document.getElementById('messages').innerHTML = '';

  // Load persisted history
  const history = await fetch(`/rooms/${encodeURIComponent(roomName)}/messages`).then(r => r.json());
  history.forEach(m => appendMsg({ type: 'message', user: m.user_name, content: m.content, timestamp: m.timestamp }));

  showView('chat');
  connectWS(roomName);
}

function connectWS(roomName) {
  if (ws) { ws.close(); ws = null; }

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(roomName)}?user_name=${encodeURIComponent(currentUser)}`);

  ws.onopen  = () => { document.getElementById('chat-status').textContent = 'connecté'; };
  ws.onclose = () => { document.getElementById('chat-status').textContent = 'déconnecté'; };
  ws.onerror = () => toast('Erreur WebSocket');
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    // Ignore our own "joined" notification (already shown via history or obvious)
    if (data.type === 'system' && data.content.startsWith(currentUser + ' a rejoint')) return;
    appendMsg(data);
  };
}

function appendMsg(data) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');

  if (data.type === 'system') {
    div.className = 'msg system';
    div.textContent = data.content;
  } else {
    const own = data.user === currentUser;
    div.className = `msg ${own ? 'own' : 'other'}`;
    div.innerHTML = `
      ${!own ? `<div class="msg-author">${esc(data.user)}</div>` : ''}
      <div class="msg-content">${esc(data.content)}</div>
      <div class="msg-time">${fmtTime(data.timestamp)}</div>
    `;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ content }));
  input.value = '';
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('back-btn').addEventListener('click', () => {
  if (ws) { ws.close(); ws = null; }
  loadRooms();
  showView('rooms');
});

// -----------------------------------------------------------------------
// Boot
// -----------------------------------------------------------------------
loadUsers();
</script>
</body>
</html>
